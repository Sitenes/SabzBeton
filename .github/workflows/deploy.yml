name: Deploy to Server

on:
  push:
    branches:
      # - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            APP_NAME="${{ github.event.repository.name }}"
            BASE_DIR="/home/amin/User/Projects/Dotnet"

            SRC_DIR="$BASE_DIR/$APP_NAME"
            PUBLISH_DIR="$BASE_DIR/Publish/$APP_NAME"

            mkdir -p "$SRC_DIR"
            mkdir -p "$PUBLISH_DIR"

            echo "Deploying $APP_NAME ..."

            dotnet-deploy "$SRC_DIR" "$PUBLISH_DIR" master
name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. گرفتن سورس
      - name: Checkout
        uses: actions/checkout@v4

      # 2. نصب .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # 3. Publish فقط linux-x64 (بدون self-contained) در مسیر اصلی out
      - name: Publish
        run: |
          dotnet publish -c Release \
            -r linux-x64 \
            --no-self-contained \
            -o out

      # 4. انتقال فایل‌ها به سرور
      - name: Upload to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "out/*"
          target: "/home/amin/apps/SabzBeton"

      # 5. اجرای صحیح روی سرور (PID + log)
      - name: Restart App
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -e

            APP_DIR="/home/amin/apps/SabzBeton"
            APP_NAME="SabzBeton"
            PID_FILE="$APP_DIR/app.pid"
            LOG_FILE="$APP_DIR/app.log"

            echo "Stopping old process..."
            if [ -f "$PID_FILE" ]; then
              kill $(cat "$PID_FILE") || true
              rm -f "$PID_FILE"
            fi

            echo "Starting app..."
            cd "$APP_DIR"
            chmod +x "$APP_NAME"

            nohup ./$APP_NAME > "$LOG_FILE" 2>&1 & echo $! > "$PID_FILE"

            echo "App started successfully"
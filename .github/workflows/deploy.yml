name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. گرفتن کد روی GitHub runner
      - name: Checkout
        uses: actions/checkout@v4

      # 2. نصب dotnet روی GitHub runner
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # 3. publish روی خود GitHub
      - name: Publish
        run: |
          dotnet publish -c Release -o out

      # 4. ارسال فایل‌ها به سرور (بدون git)
      - name: Upload to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "out/*"
          target: "/home/amin/apps/SabzBeton"

      # 5. ریستارت برنامه روی سرور
      - name: Restart App
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            pkill -f SabzBeton || true
            nohup /home/amin/apps/SabzBeton/SabzBeton > /home/amin/apps/SabzBeton/app.log 2>&1 &
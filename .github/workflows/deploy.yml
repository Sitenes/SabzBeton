name: Deploy to Server

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            dotnet-deploy /home/amin/User/Projects/Dotnet/${{ github.event.repository.name }} \
                          /home/amin/User/Projects/Dotnet/Publish/${{ github.event.repository.name }} \
                          master